name: Build and Push to GCP Artifact Registry
on:
  push:
    branches:
      - main
      - dev
      - BharatVistaar
  pull_request:
    branches:
      - main
      - dev
      - BharatVistaar
env:
  BASE_IMAGE_NAME: icar-provider-service-backend
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment: ${{ github.ref_name }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Get version from package.json
        id: package-version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version || '0.0.0')")
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Set image name and tags based on branch
        id: set-tags
        run: |
          BRANCH="${{ github.ref_name }}"
          SAFE_BRANCH=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')
          echo "IMAGE_NAME=${{ env.BASE_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          echo "BUILD_TAG=${SAFE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "LATEST_TAG=${SAFE_BRANCH}-latest" >> "$GITHUB_OUTPUT"
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/${{ steps.set-tags.outputs.IMAGE_NAME }}:${{ steps.set-tags.outputs.LATEST_TAG }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/${{ steps.set-tags.outputs.IMAGE_NAME }}:${{ steps.package-version.outputs.VERSION }}-${{ steps.set-tags.outputs.BUILD_TAG }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/${{ steps.set-tags.outputs.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/${{ steps.set-tags.outputs.IMAGE_NAME }}:${{ steps.set-tags.outputs.BUILD_TAG }}
          platforms: linux/amd64
